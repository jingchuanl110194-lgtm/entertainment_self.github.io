<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祝福</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0c0f1d 0%, #1a1040 30%, #2d1b69 60%, #0c0f1d 100%);
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            overflow: hidden;
        }

        /* ========== 星星背景 ========== */
        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            animation: twinkle var(--dur) infinite alternate;
            animation-delay: var(--delay);
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.6); }
            100% { opacity: 1; transform: scale(1.3); }
        }

        /* ========== 流星 ========== */
        .shooting-star {
            position: absolute;
            width: 2px;
            height: 80px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.8), transparent);
            border-radius: 1px;
            animation: shoot var(--sdur) linear infinite;
            animation-delay: var(--sdelay);
            opacity: 0;
        }

        @keyframes shoot {
            0% {
                opacity: 0;
                transform: translate(0, 0) rotate(-25deg);
            }
            5% { opacity: 1; }
            15% { opacity: 0; }
            100% {
                opacity: 0;
                transform: translate(-500px, 500px) rotate(-25deg);
            }
        }

        /* ========== 浮动光点 ========== */
        .floating-orb {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            animation: floatOrb var(--fodur) ease-in-out infinite;
            filter: blur(8px);
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            25% { transform: translate(var(--fox), var(--foy)) scale(1.4); opacity: 0.6; }
            50% { transform: translate(calc(var(--fox) * 1.6), calc(var(--foy) * -0.4)) scale(0.9); opacity: 0.35; }
            75% { transform: translate(calc(var(--fox) * -0.3), calc(var(--foy) * 1.2)) scale(1.5); opacity: 0.55; }
        }

        /* ========== 六角星装饰 ========== */
        .hex-star {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            animation: spinStar var(--spdur) linear infinite;
            opacity: 0.5;
        }

        @keyframes spinStar {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.3); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* ========== 主容器 ========== */
        .container {
            position: relative;
            width: 750px;
            min-height: 650px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        /* ========== 主标题 ========== */
        .main-message {
            font-size: 3.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #fdd835, #ffb74d, #ff8a65, #ffd54f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            filter: drop-shadow(0 0 30px rgba(255, 183, 77, 0.5));
            animation: titleGlow 2s ease-in-out infinite alternate;
            z-index: 2;
            text-align: center;
            line-height: 1.3;
            margin-bottom: 20px;
        }

        @keyframes titleGlow {
            0% { filter: drop-shadow(0 0 20px rgba(255, 183, 77, 0.4)); }
            100% { filter: drop-shadow(0 0 45px rgba(255, 183, 77, 0.8)); }
        }

        /* ========== 副标题 ========== */
        .subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.55);
            letter-spacing: 0.25em;
            margin-bottom: 45px;
            animation: fadeIn 2s ease-in-out;
            z-index: 2;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ========== 按钮网格 ========== */
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            z-index: 2;
            width: 480px;
        }

        .blessing-btn {
            position: relative;
            padding: 16px 12px;
            font-size: 1.15rem;
            font-weight: bold;
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            cursor: pointer;
            letter-spacing: 0.06em;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            overflow: hidden;
            font-family: inherit;
            z-index: 1;
        }

        .blessing-btn::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at center, rgba(255,255,255,0.15), transparent 70%);
            opacity: 0;
            transition: opacity 0.35s;
        }

        .blessing-btn:hover {
            transform: translateY(-4px) scale(1.04);
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3), 0 0 25px var(--glow);
        }

        .blessing-btn:hover::before {
            opacity: 1;
        }

        .blessing-btn:active {
            transform: translateY(-1px) scale(1.01);
            transition: all 0.1s;
        }

        .blessing-btn .icon {
            display: block;
            font-size: 1.8rem;
            margin-bottom: 4px;
        }

        /* ========== 模态弹窗 ========== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: overlayIn 0.3s ease-out;
        }

        @keyframes overlayIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .modal-overlay.closing {
            animation: overlayOut 0.25s ease-in forwards;
        }

        @keyframes overlayOut {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        .modal-panel {
            background: linear-gradient(160deg, #1e1b4b 0%, #312e81 40%, #1e1b4b 100%);
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px;
            padding: 35px 30px;
            max-width: 500px;
            width: 90%;
            max-height: 75vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 50px var(--modal-glow);
            animation: panelIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        @keyframes panelIn {
            0% { transform: scale(0.85) translateY(30px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .modal-panel.closing {
            animation: panelOut 0.25s ease-in forwards;
        }

        @keyframes panelOut {
            0% { transform: scale(1) translateY(0); opacity: 1; }
            100% { transform: scale(0.85) translateY(30px); opacity: 0; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }

        .modal-title {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffd54f;
            text-shadow: 0 0 15px rgba(255,213,79,0.4);
        }

        .modal-close {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
            line-height: 1;
        }

        .modal-close:hover {
            background: rgba(255, 80, 80, 0.25);
            border-color: rgba(255, 100, 100, 0.6);
            transform: rotate(90deg);
        }

        .blessing-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .blessing-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 18px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            line-height: 1.6;
            animation: itemIn 0.4s ease-out both;
            transition: all 0.25s;
            letter-spacing: 0.03em;
        }

        .blessing-item:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.35);
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        @keyframes itemIn {
            0% { opacity: 0; transform: translateX(-20px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        /* ========== 粒子光点（按钮周围） ========== */
        .sparkle {
            position: absolute;
            pointer-events: none;
            z-index: 0;
            animation: sparklePop 1s ease-out forwards;
        }

        @keyframes sparklePop {
            0% { opacity: 1; transform: translate(0,0) scale(1); }
            100% { opacity: 0; transform: translate(var(--sx), var(--sy)) scale(0); }
        }

        /* scrollbar */
        .modal-panel::-webkit-scrollbar {
            width: 5px;
        }
        .modal-panel::-webkit-scrollbar-track {
            background: transparent;
        }
        .modal-panel::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .main-message { font-size: 2.4rem; }
            .btn-grid {
                grid-template-columns: repeat(2, 1fr);
                width: 90vw;
                gap: 10px;
            }
            .blessing-btn { padding: 12px 8px; font-size: 1rem; }
            .blessing-btn .icon { font-size: 1.4rem; }
            .container { width: 100%; min-height: auto; }
        }
    </style>
</head>

            orb.style.width = size + 'px';
            orb.style.height = size + 'px';
            orb.style.background = orbColors[i % orbColors.length];
            orb.style.left = (Math.random() * 80 + 10) + '%';
            orb.style.top = (Math.random() * 80 + 10) + '%';
            orb.style.setProperty('--fodur', (Math.random() * 8 + 7) + 's');
            orb.style.setProperty('--fox', (Math.random() * 60 - 30) + 'px');
            orb.style.setProperty('--foy', (Math.random() * 60 - 30) + 'px');
            orb.style.animationDelay = (Math.random() * 5) + 's';
            orbsContainer.appendChild(orb);
        }

        // ========== 生成六角星装饰 ==========
        const hexContainer = document.getElementById('hexStars');
        function createHexStar(left, top, size, color, duration) {
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('width', size);
            svg.setAttribute('height', size);
            svg.setAttribute('viewBox', '0 0 24 24');
            svg.style.position = 'absolute';
            svg.style.left = left;
            svg.style.top = top;
            svg.classList.add('hex-star');
            svg.style.setProperty('--spdur', duration);
            svg.innerHTML = `<polygon points="12,2 15,8 21,9 16,14 18,20 12,17 6,20 8,14 3,9 9,8"
                fill="none" stroke="${color}" stroke-width="1.2" stroke-linejoin="round"/>`;
            hexContainer.appendChild(svg);
        }
        createHexStar('5%', '10%', '28', 'rgba(255,215,0,0.6)', '12s');
        createHexStar('88%', '15%', '22', 'rgba(255,105,180,0.5)', '15s');
        createHexStar('92%', '75%', '26', 'rgba(100,200,255,0.5)', '10s');
        createHexStar('7%', '80%', '20', 'rgba(120,220,160,0.5)', '14s');
        createHexStar('50%', '92%', '24', 'rgba(200,140,255,0.5)', '11s');

        // ========== 按钮点击 -> 弹窗 ==========
        function openModal(category) {
            const data = blessingsData[category];
            if (!data) return;

            // 移除已有弹窗
            const existing = document.querySelector('.modal-overlay');
            if (existing) existing.remove();

            // 创建遮罩
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';

            // 创建面板
            const panel = document.createElement('div');
            panel.className = 'modal-panel';
            panel.style.setProperty('--modal-glow', data.glow);

            // 头部
            const header = document.createElement('div');
            header.className = 'modal-header';
            header.innerHTML = `
                <span class="modal-title">${data.icon} ${data.title.replace(/^[^\s]+\s/, '')}</span>
                <button class="modal-close" title="关闭">✕</button>
            `;
            panel.appendChild(header);

            // 祝福列表
            const list = document.createElement('div');
            list.className = 'blessing-list';
            data.items.forEach((text, idx) => {
                const item = document.createElement('div');
                item.className = 'blessing-item';
                item.style.animationDelay = (idx * 0.05) + 's';
                item.textContent = text;
                list.appendChild(item);
            });
            panel.appendChild(list);

            overlay.appendChild(panel);
            document.body.appendChild(overlay);

            // 关闭逻辑
            function closeModal() {
                overlay.classList.add('closing');
                panel.classList.add('closing');
                setTimeout(() => overlay.remove(), 280);
            }

            overlay.querySelector('.modal-close').addEventListener('click', closeModal);
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) closeModal();
            });
            document.addEventListener('keydown', function escHandler(e) {
                if (e.key === 'Escape') {
                    closeModal();
                    document.removeEventListener('keydown', escHandler);
                }
            });
        }

        // ========== 绑定按钮事件 ==========
        document.querySelectorAll('.blessing-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const category = btn.dataset.category;

                // 按钮点击涟漪特效
                const rect = btn.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                for (let i = 0; i < 12; i++) {
                    const sparkle = document.createElement('div');
                    sparkle.className = 'sparkle';
                    const angle = (Math.PI * 2 * i) / 12;
                    const dist = 30 + Math.random() * 40;
                    sparkle.style.cssText = `
                        position: fixed;
                        left: ${cx}px;
                        top: ${cy}px;
                        width: 6px;
                        height: 6px;
                        background: ${btn.style.getPropertyValue('--glow') || 'rgba(255,255,255,0.8)'};
                        border-radius: 50%;
                        pointer-events: none;
                        z-index: 200;
                        --sx: ${Math.cos(angle) * dist}px;
                        --sy: ${Math.sin(angle) * dist}px;
                    `;
                    document.body.appendChild(sparkle);
                    sparkle.addEventListener('animationend', () => sparkle.remove());
                }

                // 稍后打开弹窗
                setTimeout(() => openModal(category), 100);
            });
        });
    </script>
</body>
</html>
