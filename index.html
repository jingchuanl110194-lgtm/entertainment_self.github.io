<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祝你考试顺利</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 600px;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-message {
            font-size: 3.5rem;
            color: #fff;
            text-shadow: 0 3px 20px rgba(0, 0, 0, 0.3);
            animation: fadeIn 1.5s ease-in-out;
            z-index: 2;
            text-align: center;
            line-height: 1.3;
        }

        .blessing {
            position: absolute;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.15);
            animation: floatIn 2s ease-in-out both;
            white-space: nowrap;
        }

        /* 每个祝福语不同的动画延迟和位置 */
        .blessing:nth-child(2)  { animation-delay: 0.1s; }
        .blessing:nth-child(3)  { animation-delay: 0.2s; }
        .blessing:nth-child(4)  { animation-delay: 0.3s; }
        .blessing:nth-child(5)  { animation-delay: 0.4s; }
        .blessing:nth-child(6)  { animation-delay: 0.5s; }
        .blessing:nth-child(7)  { animation-delay: 0.6s; }
        .blessing:nth-child(8)  { animation-delay: 0.7s; }
        .blessing:nth-child(9)  { animation-delay: 0.8s; }
        .blessing:nth-child(10) { animation-delay: 0.9s; }
        .blessing:nth-child(11) { animation-delay: 1.0s; }
        .blessing:nth-child(12) { animation-delay: 1.1s; }
        .blessing:nth-child(13) { animation-delay: 1.2s; }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(-20px) scale(0.9);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes floatIn {
            0% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0.5);
            }
            100% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
        }

        /* 粒子星星效果 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: twinkle 3s infinite alternate;
        }

        @keyframes twinkle {
            0% {
                opacity: 0.3;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1.2);
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="container">
        <div class="main-message">祝你考试顺利</div>

        <div class="blessing" style="top: 5%; left: 20%; --tx: 30px; --ty: -20px;">📝 下笔如有神</div>
        <div class="blessing" style="top: 2%; left: 45%; --tx: 0px; --ty: -30px;">💪 逢考必过</div>
        <div class="blessing" style="top: 5%; right: 18%; --tx: -30px; --ty: -20px;">🏆 金榜题名</div>
        <div class="blessing" style="top: 18%; right: 3%; --tx: -40px; --ty: 0px;">✨ 超常发挥</div>
        <div class="blessing" style="top: 40%; right: -2%; --tx: -40px; --ty: -10px;">🎯 考的都会</div>
        <div class="blessing" style="bottom: 35%; right: 3%; --tx: -35px; --ty: 10px;">🍀 好运爆棚</div>
        <div class="blessing" style="bottom: 15%; right: 15%; --tx: -25px; --ty: 20px;">🌟 旗开得胜</div>
        <div class="blessing" style="bottom: 8%; left: 42%; --tx: 0px; --ty: 25px;">💯 门门满分</div>
        <div class="blessing" style="bottom: 15%; left: 16%; --tx: 25px; --ty: 20px;">🎓 前程似锦</div>
        <div class="blessing" style="bottom: 35%; left: -2%; --tx: 35px; --ty: 10px;">🔥 势在必得</div>
        <div class="blessing" style="top: 38%; left: -2%; --tx: 35px; --ty: -10px;">🎉 一鸣惊人</div>
        <div class="blessing" style="top: 18%; left: 3%; --tx: 30px; --ty: 0px;">💫 心想事成</div>
    </div>

    <script>
        // 生成随机星星
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = (Math.random() * 2 + 2) + 's';
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
